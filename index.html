<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup Page</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="container">
    <div class="form-box">
      <h2>Get Started Now</h2>
      <p>Set your profile picture</p>
      
      <!-- Profile Picture Upload -->
      <label for="fileInput">
        <div class="profile-pic" id="profilePreview">+</div>
      </label>
      <input type="file" id="fileInput" accept="image/*">

      <form>
       <label for="name">Name </label>
       <input type="text" placeholder="Enter your name" required>
       <label for ="email">Email </label>
       <input type="email" placeholder="Enter your E-mail" required>
        <label for="password">password </label>
       <input type="password" placeholder="Enter your password" required>
       <label for="confirm-password">confirm password</label>
       <input type="password" placeholder="Enter your password" required>

        <label>
          <input type="checkbox" required> I agree to the terms & policy
        </label>

        <button type="submit" class="btn">Signup</button>
      </form>

      <div class="or">or</div>

      <div class="social">
<button><img src="images/Google.jpg"alt="Google"> Sign in with Google</button>
<button><img src="images/apple.jpeg" alt="Apple"> Sign in with Apple</button>
      </div>

      <div class="login-link">
        Have an account? <a href="#">Sign In</a>
      </div>
    </div>

    <div class="image-box"></div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const profilePreview = document.getElementById("profilePreview");

    fileInput.addEventListener("change", function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          profilePreview.innerHTML = `<img src="${e.target.result}" alt="Profile Picture">`;
        }
        reader.readAsDataURL(file);
      }
    });
  </script>

</body>
</html>
